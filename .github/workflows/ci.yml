name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build, Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/BudgetApp.sln

      - name: Build (warnings as errors)
        run: dotnet build backend/BudgetApp.sln --no-restore --configuration Release -warnaserror

      - name: Check formatting
        run: dotnet format backend/BudgetApp.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test backend/BudgetApp.sln --no-build --configuration Release --verbosity normal

  schema-freshness:
    name: Schema — Verify swagger.json and Zod schemas are current
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore backend
        run: dotnet restore backend/BudgetApp.sln

      - name: Build backend
        run: dotnet build backend/BudgetApp.sln --no-restore --configuration Release

      - name: Regenerate swagger.json
        env:
          MongoDB__ConnectionString: "mongodb://localhost:27017"
          MongoDB__DatabaseName: "budgetapp"
        run: >
          dotnet swagger tofile
          --output swagger.json
          backend/BudgetApp.Api/bin/Release/net8.0/BudgetApp.Api.dll
          v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Regenerate Zod schemas
        run: npm run generate:schemas
        working-directory: frontend

      - name: Check for schema drift
        run: |
          if ! git diff --exit-code swagger.json frontend/src/api/generated/schemas.ts; then
            echo ""
            echo "❌ Generated files are out of sync with the backend."
            echo "   Run: dotnet build && dotnet swagger tofile ... && cd frontend && npm run generate:schemas"
            echo "   Then commit the updated swagger.json and src/api/generated/schemas.ts."
            exit 1
          fi

  frontend:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (Biome)
        run: npx biome ci .
        working-directory: frontend

      - name: Type-check
        run: npx tsc -b
        working-directory: frontend

      - name: Test
        run: npm test --if-present
        working-directory: frontend
