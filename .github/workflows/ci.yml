name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build, Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/BudgetApp.sln

      - name: Build (warnings as errors)
        run: dotnet build backend/BudgetApp.sln --no-restore --configuration Release -warnaserror

      - name: Check formatting
        run: dotnet format backend/BudgetApp.sln --verify-no-changes --no-restore

      - name: Test
        run: dotnet test backend/BudgetApp.sln --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (Biome)
        run: npx biome ci .
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test
        run: npm test --if-present
        working-directory: frontend
