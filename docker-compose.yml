# Before first run, copy your Firebase env vars to the project root:
#   cp frontend/.env .env
# Then start everything with:
#   docker compose up --build

services:
  api:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDB__ConnectionString: mongodb://mongo:27017
      MongoDB__DatabaseName: budgetapp
      Firebase__ServiceAccountPath: /app/firebase-service-account.json
    volumes:
      - ./backend/BudgetApp.Api/firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      - mongo
    networks:
      - budget-net
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - budget-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - budget-net

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - budget-net

networks:
  budget-net:

volumes:
  mongodb_data:
  ollama_data:
