services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: budgetapp
    networks:
      - budget-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - budget-net

  # ── Application ────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
    volumes:
      # Mount source for development — rebuild container to pick up changes
      - ./backend:/app
      # Keep build artifacts inside the container — do not override with host bin/obj
      - /app/BudgetApp.Api/bin
      - /app/BudgetApp.Api/obj
      - /app/BudgetApp.Tests/bin
      - /app/BudgetApp.Tests/obj
      # Keep NuGet cache between runs
      - nuget_cache:/root/.nuget/packages
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - budget-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Browser connects to backend on localhost (requests leave the browser, not the container)
      VITE_API_URL: http://localhost:5000
      # Add your Firebase config here or in a .env file (optional — app works without it in dev)
      # VITE_FIREBASE_API_KEY: your-key
      # VITE_FIREBASE_AUTH_DOMAIN: your-project.firebaseapp.com
      # VITE_FIREBASE_PROJECT_ID: your-project
      # VITE_FIREBASE_STORAGE_BUCKET: your-project.appspot.com
      # VITE_FIREBASE_MESSAGING_SENDER_ID: your-sender-id
      # VITE_FIREBASE_APP_ID: your-app-id
    volumes:
      - ./frontend:/app
      # Keep node_modules inside the container — do not override with host folder
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - budget-net
    restart: unless-stopped

networks:
  budget-net:
    driver: bridge

volumes:
  mongodb_data:
  ollama_data:
  nuget_cache:
